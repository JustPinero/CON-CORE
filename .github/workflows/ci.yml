name: CI

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ api/ --ext .ts,.tsx --max-warnings 0

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx,css}" "api/**/*.ts"

      - name: Unit & integration tests
        run: npx vitest run --coverage

      - name: Build
        run: npx vite build

      - name: Secret scan
        run: |
          if git diff --cached --name-only | xargs grep -rlE 'sk-ant-|sk-|ghp_|AKIA|supabase.*service_role' 2>/dev/null; then
            echo "::error::Potential secrets detected in staged files"
            exit 1
          fi
          echo "No secrets detected"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Check e2e manifest
        id: manifest
        run: |
          if node -e "const m=require('./e2e-manifest.json'); const active=Object.values(m.flows).some(s=>s!=='not-started'); process.exit(active?0:1);" 2>/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E tests
        if: steps.manifest.outputs.has_tests == 'true'
        run: npx playwright test

      - name: Skip E2E (no active flows)
        if: steps.manifest.outputs.has_tests == 'false'
        run: echo "No active e2e flows yet — skipping"
